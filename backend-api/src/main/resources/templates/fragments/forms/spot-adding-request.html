<!DOCTYPE html>
<html lang="ru"
      xmlns:layout="http://www.ulisse.it/thymeleaf-layout-dialect"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Logout form fragment</title>
</head>
<body>
  <form layout:fragment="form" action="/spot-adding-request" method="post"
        enctype="multipart/form-data" th:object="${formData}" class="form">
    <div class="input-label">
      <div th:if="${#fields.hasErrors('spotName')}" th:errors="*{spotName}"
           class="input-msg-error">Должно быть от 3 до 50 символов</div>
      <label for="spotName" class="input-label__label">Название спота</label>
      <input type="text" id="spotName" name="spotName" required placeholder="..."
             autofocus th:field="*{spotName}" class="input-label__input"/>
    </div>

    <div class="input-label">
      <div id="mapCoordsError" th:if="${#fields.hasErrors('spotLon') || #fields.hasErrors('spotLat')}"
           class="input-msg-error">Не указана точка</div>
      <label for="map-coords-id" class="input-label__label">Точка на карте</label>
      <div id="map-coords-id" class="coords-inputs"
           th:classappend="${#fields.hasErrors('spotLon') || #fields.hasErrors('spotLat')} ? ' coords-inputs--invalid' : ''"
           data-bs-toggle="modal" data-bs-target="#mapModal" role="button" tabindex="0"
           aria-describedby="mapCoordsHelp">
        <div id="mapCoordsText" class="map-coords-help">Точка не выбрана</div>
        <img src="/assets/marker.svg" alt="map marker" class="coords-inputs__marker">
      </div>
      <div id="mapCoordsHelp" class="coords-inputs__help">Нажмите, чтобы выбрать точку на карте</div>
      <input type="hidden" id="lon" name="lon" th:field="*{spotLon}"/>
      <input type="hidden" id="lat" name="lat" th:field="*{spotLat}"/>
    </div>
    <div th:replace="~{fragments/modals/choice_point_on_map :: choice-point-on-ymap-modal(lonInputId='lon', latInputId='lat')}">
      place for ymap modal
    </div>

    <div class="input-label">
      <div th:if="${#fields.hasErrors('spotDescription')}"
           class="input-msg-error">Должно быть от 10 до 300 символов</div>
      <label for="description" class="input-label__label">Описание</label>
      <textarea id="description" name="description" required
                placeholder="..." th:field="*{spotDescription}"
                class="input-label__input input-label__input-desc">
      </textarea>
    </div>

    <!--/* todo унести в отдельный компонент */-->
    <div class="input-label">
      <div th:if="${#fields.hasErrors('files')}" class="input-msg-error">
        <ul>
          <li th:each="err : ${#fields.errors('files')}"
              th:text="${err}"></li>
        </ul>
      </div>
      <label for="photos" class="input-label__label">Фотографии</label>

      <div class="custom-file-input">
        <input type="file" multiple id="photos" name="photos" accept="image/*" th:field="*{files}" class="custom-file-input__input" />
        <label for="photos" class="btn btn-gray">Выбрать фото</label>
        <span class="custom-file-input__selected-count">Файлы не выбраны</span>
      </div>
    </div>
    <script type="application/javascript">
      const spotAddingRequestForm = document.querySelector('form[action="/spot-adding-request"]');
      const mapCoordsInput = document.getElementById('map-coords-id');
      const mapCoordsText = document.getElementById('mapCoordsText');
      const mapCoordsHelp = document.getElementById('mapCoordsHelp');
      const mapCoordsError = document.getElementById('mapCoordsError');
      const lonInput = document.getElementById('lon');
      const latInput = document.getElementById('lat');

      function isSelectedMapPoint() {
        const lonValue = lonInput.value.trim();
        const latValue = latInput.value.trim();
        if (!lonValue || !latValue) {
          return false;
        }

        const lon = Number(lonValue);
        const lat = Number(latValue);
        return Number.isFinite(lon) && Number.isFinite(lat)
                && lon >= -180 && lon <= 180
                && lat >= -90 && lat <= 90;
      }

      function updateMapPointState(showError = false) {
        const selected = isSelectedMapPoint();
        mapCoordsInput.classList.toggle('coords-inputs--selected', selected);
        mapCoordsInput.classList.toggle('coords-inputs--invalid', !selected && showError);

        if (selected) {
          if (mapCoordsError) {
            mapCoordsError.style.display = 'none';
          }
          mapCoordsText.textContent = `Выбрано: ${latInput.value}, ${lonInput.value}`;
          mapCoordsHelp.textContent = 'Нажмите, чтобы изменить точку';
          return;
        }

        if (mapCoordsError) {
          mapCoordsError.style.display = 'none';
        }

        mapCoordsText.textContent = 'Точка не выбрана';
        mapCoordsHelp.textContent = showError
                ? 'Выберите точку на карте перед созданием спота'
                : 'Нажмите, чтобы выбрать точку на карте';
      }

      window.addEventListener('map-point-selected', () => updateMapPointState(false));
      updateMapPointState(Boolean(mapCoordsError));

      mapCoordsInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          mapCoordsInput.click();
        }
      });

      spotAddingRequestForm.addEventListener('submit', function(event) {
        if (!isSelectedMapPoint()) {
          event.preventDefault();
          updateMapPointState(true);
          mapCoordsInput.focus();
          mapCoordsInput.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
      });

      document.getElementById('photos').addEventListener('change', function() {
        const countSpan = document.querySelector('.custom-file-input__selected-count');
        if (this.files.length === 0) {
          countSpan.textContent = 'Файлы не выбраны';
        } else {
          countSpan.textContent = `${this.files.length} файл(ов) выбран`;
        }
      });
    </script>

    <button type="submit" class="btn btn-orange w-100 h-50px mt-20px">Создать</button>
  </form>
</body>
</html>
