<!--/*@thymesVar id="message" type="java.lang.String"*/-->
<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ulisse.it/thymeleaf-layout-dialect"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Sign-in страница</title>
</head>
<body>
<div layout:fragment="content" class="content">
    <h2 class="header-title">Вход</h2>
    <div class="alert alert-success text-center h-m-8px h-50px lh-1"
         th:if="${message != null}" th:text="${message}"></div>
    <form th:replace="~{fragments/forms/sign-in :: form}">
        place for custom sign-in form
    </form>
</div>
</body>
</html>
